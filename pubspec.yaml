name: agaram
description: "Agaram — Tamil Ilakiya Mandram club management app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  google_fonts: ^6.2.1
  provider: ^6.1.2

  cloudinary_public: ^0.23.1
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  cached_network_image: ^3.4.1
  intl: ^0.19.0

  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/kurals.json
