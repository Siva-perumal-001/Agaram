name: agaram
description: "Agaram — Tamil Ilakiya Mandram club management app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  google_fonts: ^6.2.1
  provider: ^6.1.2

  cloudinary_public: ^0.23.1
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  cached_network_image: ^3.4.1
  intl: ^0.19.0

  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  uuid: ^4.5.1

  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3
  googleapis_auth: ^1.6.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.14.1

flutter_native_splash:
  color: "#FFF8F7"
  color_dark: "#FFF8F7"
  android_12:
    color: "#FFF8F7"
    color_dark: "#FFF8F7"
  android: true
  ios: false
  web: false

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFF8F7"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 23

flutter:
  uses-material-design: true
  assets:
    - assets/kurals.json
    - assets/fcm-service-account.json
